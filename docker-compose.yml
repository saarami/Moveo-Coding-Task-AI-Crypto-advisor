services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crypto_advisor}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: on-failure
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # These Docker-specific values override the .env file equivalents.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-crypto_advisor}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost:5173"]'
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      # API keys (COINGECKO_API_KEY, CRYPTOPANIC_API_KEY, OPENROUTER_API_KEY,
      # HUGGINGFACE_API_KEY, HUGGINGFACE_MODEL) are loaded from env_file above.
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    restart: on-failure
    ports:
      - "5173:5173"
    environment:
      # React runs in the browser — always use the host-visible backend URL.
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules   # keep container's installed node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
